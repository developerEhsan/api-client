name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-flight runs for the same ref (e.g. new pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint / Typecheck / Build / Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & format check (Biome)
        run: pnpm lint

      # Build MUST run before typechecking dependents: examples and the
      # tanstack-query package consume core through its built dist/ types.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  # Runtime-safety invariant (see CLAUDE.md / SSR RPC bridge): the browser
  # bundle must contain no backend host, paths, openapi, or axios.
  browser-bundle-guard:
    name: Browser bundle leak check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build core
        run: pnpm --filter @developerehsan/api-client build
      - name: Assert browser bundle is clean
        run: node scripts/check-browser-bundle.mjs
